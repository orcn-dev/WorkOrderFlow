name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test .\WorkOrderFlow.Tests\WorkOrderFlow.Tests.csproj --no-build --verbosity normal

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t workorderflow .

      - name: Run Docker container
        run: docker run -d --name workorderflow-test -p 5298:8080 workorderflow

      - name: Wait for application startup
        run: sleep 10

      - name: Smoke test health endpoint
        run: curl --fail http://localhost:5298/health

      - name: Stop Docker container
        if: always()
        run: docker stop workorderflow-test